services:
  nginx:
    image: nginx:alpine
    container_name: teacher-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

  backend:
    build: .
    container_name: teacher-backend
    expose:
      - "8080"
    restart: unless-stopped
