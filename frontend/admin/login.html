<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход · Админка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #14141c;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 40px;
      width: 360px;
      max-width: 90vw;
    }
    h1 { font-size: 1.3rem; margin-bottom: 24px; text-align: center; color: #00d4ff; }
    label { display: block; font-size: 0.85rem; color: #8888a0; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #00d4ff; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #00d4ff;
      color: #000;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: #00ff88; }
    .error { color: #ff4444; font-size: 0.85rem; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🔐 Вход в админку</h1>
    <form id="loginForm">
      <label for="login">Логин</label>
      <input type="text" id="login" name="login" required>
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Войти</button>
      <div class="error" id="error"></div>
    </form>
  </div>
  <script>
    const token = localStorage.getItem('admin-token');
    if (token) { window.location.href = '/admin/'; }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const login = document.getElementById('login').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('admin-token', data.token);
          window.location.href = '/admin/';
        } else {
          document.getElementById('error').textContent = 'Неверный логин или пароль';
        }
      } catch { document.getElementById('error').textContent = 'Ошибка подключения'; }
    });
  </script>
</body>
</html>
